name: Build Extension APK

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module path (e.g., src:en:theblank)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew ${{ github.event.inputs.module }}:assembleDebug

      - name: Find APK
        id: find_apk
        run: |
          MODULE_PATH=$(echo "${{ github.event.inputs.module }}" | tr ':' '/')
          APK_PATH=$(find "$MODULE_PATH" -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.module }}-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 7
